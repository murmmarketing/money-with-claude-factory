<svg xmlns="http://www.w3.org/2000/svg" width="560" height="128" viewBox="0 0 560 128" role="img" aria-label="The Rep Playbook">
  <title>The Rep Playbook</title>
  <desc>The Rep Playbook wordmark: an editorial book-jacket lockup with a rust-accented open-manual mark (open book and bookmark ribbon) beside the serif title, on a paper panel.</desc>

  <!-- Self-contained paper panel so the mark renders on any background -->
  <rect x="2" y="2" width="556" height="124" rx="14" fill="#FBF6EC" stroke="#E3D8C2" stroke-width="2"/>

  <!-- Mark: open manual / handbook with rust bookmark ribbon -->
  <g>
    <!-- open book, two pages meeting at the spine (x=66) -->
    <path d="M32 42 Q49 35 66 40 L66 92 Q49 87 32 90 Z" fill="#FFFFFF" stroke="#211C16" stroke-width="3" stroke-linejoin="round"/>
    <path d="M100 42 Q83 35 66 40 L66 92 Q83 87 100 90 Z" fill="#FFFFFF" stroke="#211C16" stroke-width="3" stroke-linejoin="round"/>
    <!-- spine -->
    <line x1="66" y1="40" x2="66" y2="92" stroke="#211C16" stroke-width="3" stroke-linecap="round"/>
    <!-- page text lines (muted) -->
    <line x1="39" y1="55" x2="59" y2="52" stroke="#5E5442" stroke-width="2" stroke-linecap="round"/>
    <line x1="39" y1="64" x2="59" y2="61" stroke="#5E5442" stroke-width="2" stroke-linecap="round"/>
    <line x1="39" y1="73" x2="55" y2="70.5" stroke="#5E5442" stroke-width="2" stroke-linecap="round"/>
    <line x1="73" y1="52" x2="93" y2="55" stroke="#5E5442" stroke-width="2" stroke-linecap="round"/>
    <line x1="73" y1="61" x2="93" y2="64" stroke="#5E5442" stroke-width="2" stroke-linecap="round"/>
    <line x1="73" y1="70.5" x2="89" y2="73" stroke="#5E5442" stroke-width="2" stroke-linecap="round"/>
    <!-- rust bookmark ribbon (the single accent) -->
    <path d="M85 36 L85 63 L90.5 57.5 L96 63 L96 36 Z" fill="#C1432A"/>
  </g>

  <!-- 'THE' tracked label -->
  <text x="128" y="50"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="15" font-weight="600" letter-spacing="6" fill="#5E5442">THE</text>

  <!-- Serif wordmark -->
  <text x="126" y="96"
        font-family="'Fraunces', 'Georgia', 'Times New Roman', serif"
        font-size="46" font-weight="600" letter-spacing="-0.5" fill="#211C16">Rep Playbook</text>
</svg>
