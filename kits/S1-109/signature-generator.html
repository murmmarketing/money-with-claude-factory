<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Signature Studio — bulletproof email signature generator</title>
<style>
  :root{--ac:#2f6df6}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#f4f6fb;color:#101828}
  .wrap{max-width:920px;margin:0 auto;padding:28px 18px}
  h1{font-size:22px;margin:0 0 4px}
  p.sub{color:#667085;margin:0 0 22px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}
  .card{background:#fff;border:1px solid #e4e7ec;border-radius:12px;padding:18px}
  label{display:block;font-size:12px;font-weight:600;color:#344054;margin:10px 0 4px}
  input{width:100%;padding:9px 11px;border:1px solid #d0d5dd;border-radius:8px;font-size:14px}
  .row{display:flex;gap:10px}.row>div{flex:1}
  button{margin-top:16px;width:100%;background:var(--ac);color:#fff;border:0;border-radius:8px;padding:11px;font-size:15px;font-weight:600;cursor:pointer}
  .preview{min-height:120px;border:1px dashed #d0d5dd;border-radius:8px;padding:16px;background:#fff;overflow:auto}
  textarea{width:100%;height:150px;margin-top:12px;font-family:ui-monospace,Menlo,monospace;font-size:12px;border:1px solid #d0d5dd;border-radius:8px;padding:10px}
  .hint{font-size:12px;color:#98a2b3;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Signature Studio</h1>
  <p class="sub">Fill in the fields → get a bulletproof, table-based HTML signature that survives Gmail, Outlook &amp; Apple Mail. Paste it into Settings → Signature.</p>
  <div class="grid">
    <div class="card">
      <label>Full name</label><input id="name" value="Jordan Rivera">
      <div class="row"><div><label>Title</label><input id="title" value="Head of Operations"></div>
      <div><label>Company</label><input id="company" value="Northgate Partners"></div></div>
      <div class="row"><div><label>Phone</label><input id="phone" value="+1 (415) 555-0132"></div>
      <div><label>Website</label><input id="site" value="northgatepartners.com"></div></div>
      <label>Logo image URL (optional)</label><input id="logo" value="">
      <div class="row"><div><label>Accent color</label><input id="color" value="#2f6df6"></div>
      <div><label>Booking/CTA link (optional)</label><input id="cta" value="https://cal.com/jordan"></div></div>
      <button onclick="gen()">Generate &amp; copy HTML</button>
      <p class="hint">Tip: host the logo somewhere public (Imgur, your site) and paste the direct image URL.</p>
    </div>
    <div class="card">
      <label>Live preview</label>
      <div id="preview" class="preview"></div>
      <label>HTML (auto-copied on Generate)</label>
      <textarea id="code" readonly></textarea>
    </div>
  </div>
</div>
<script>
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function build(){
  const v=id=>document.getElementById(id).value.trim();
  const ac=v('color')||'#2f6df6';
  const logo=v('logo');
  const site=v('site'); const siteUrl = site? (site.startsWith('http')?site:'https://'+site):'';
  const cta=v('cta');
  const logoCell = logo? `<td style="padding:0 16px 0 0;vertical-align:top"><img src="${esc(logo)}" width="56" height="56" style="display:block;border-radius:8px" alt=""></td>`:'';
  const ctaRow = cta? `<tr><td style="padding-top:8px"><a href="${esc(cta)}" style="background:${esc(ac)};color:#fff;text-decoration:none;font:600 12px system-ui;padding:7px 12px;border-radius:6px;display:inline-block">Book a call</a></td></tr>`:'';
  return `<table cellpadding="0" cellspacing="0" border="0" style="font-family:Arial,Helvetica,sans-serif;color:#101828"><tr>${logoCell}<td style="vertical-align:top">
<table cellpadding="0" cellspacing="0" border="0"><tr><td style="font:700 15px Arial;color:#101828;padding-bottom:1px">${esc(v('name'))}</td></tr>
<tr><td style="font:400 13px Arial;color:#475467;padding-bottom:6px">${esc(v('title'))}${v('company')?' · '+esc(v('company')):''}</td></tr>
<tr><td style="border-top:2px solid ${esc(ac)};padding-top:6px;font:400 12px Arial;color:#475467">
${v('phone')?'📞 '+esc(v('phone'))+'&nbsp;&nbsp;':''}${siteUrl?'🌐 <a href="'+esc(siteUrl)+'" style="color:'+esc(ac)+';text-decoration:none">'+esc(site)+'</a>':''}
</td></tr>${ctaRow}</table></td></tr></table>`;
}
function gen(){
  const html=build();
  document.getElementById('preview').innerHTML=html;
  const code=document.getElementById('code'); code.value=html;
  code.select(); try{navigator.clipboard.writeText(html)}catch(e){}
}
gen();
</script>
</body>
</html>
